<!DOCTYPE html>
<html>

<head>
    <title>Auto Fill</title>
    <style>
        body {
            font-family: sans-serif;
            width: 320px;
            padding: 12px;
            background: #0f172a;
            color: white;
        }

        input,
        textarea,
        select {
            width: 100%;
            margin-bottom: 8px;
            padding: 6px;
            border-radius: 6px;
            border: none;
            background: #1e293b;
            color: white;
        }

        textarea {
            height: 70px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        .row {
            display: flex;
            gap: 6px;
        }
    </style>
</head>

<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3 style="margin: 0;">Auto Fill</h3>
    </div>

    <div class="row" style="margin-bottom: 15px;">
        <button id="btnTab1" style="background: #38bdf8; color: #0f172a;">Manual Fill</button>
        <button id="btnTab2" style="background: #1e293b; color: white;">Record Flow</button>
    </div>

    <!-- TAB 1: MANUAL FILL -->
    <div id="tab1">
        <label>Preset</label>
    <div class="row">
        <select id="presetList"></select>
        <button id="savePreset">Save</button>
        <button id="deletePreset">Delete</button>
    </div>

    <label>Selector</label>
    <input id="selector" placeholder="#form input[id^='target'], #form input[id^='pagu']">

    <label>Values (manual optional)</label>
    <textarea id="values" placeholder="Kosongkan jika pakai clipboard"></textarea>

    <div class="row">
        <select id="delimiter">
            <option value=" ">Spasi</option>
            <option value=",">Koma</option>
            <option value="|">Pipe</option>
            <option value="custom">Custom</option>
        </select>

        <select id="mode">
            <option value="pair">Auto Pair</option>
            <option value="single">Single</option>
        </select>
    </div>

    <input id="customDelimiter" placeholder="Custom delimiter" style="display:none">

        <button id="fill">Auto Fill</button>
    </div>

    <!-- TAB 2: RECORD FLOW -->
    <div id="tab2" style="display: none;">
        <label>Form Selector / Target Wrapper (Opsional)</label>
        <input type="text" id="recordFormSelector" placeholder="Contoh: #modal-dialog atau .card">

        <label style="margin-top: 10px; display: block;">Profile Record</label>
        <div class="row">
            <select id="recordProfileList"></select>
            <button id="deleteRecordProfile" style="background: #ef4444; color: white;">Delete</button>
        </div>
        <div class="row" style="margin-top: 5px;">
            <input type="text" id="newProfileInput" placeholder="Nama profile baru..." style="margin-bottom: 0;">
            <button id="saveRecordProfile" style="background: #22c55e; color: white;">Simpan/Update</button>
        </div>

        <button id="btnRecordForm" style="display:none; margin-top: 15px; background: #4ade80; color: #0f172a;">▶ Record Form (Auto Click)</button>
        <button id="btnRecordInput" style="margin-top: 8px; background: #f43f5e; color: white;">● Start Record Input</button>

        <label style="margin-top: 15px; display: block;">Recorded Data</label>
        <textarea id="recordedData" placeholder="Data rekam akan muncul di sini" style="height: 120px; font-family: monospace; font-size: 11px;" readonly></textarea>
        
        <button id="btnClearRecord" style="margin-bottom: 8px; background: #64748b; color: white; padding: 6px;">Clear Record</button>
        <button id="btnEksekusi" style="background: #eab308; color: #0f172a;">⚡ Eksekusi Autofill</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
